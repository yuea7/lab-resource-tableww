<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实验室资源占用情况</title>
<style>
/* 基础样式：保证布局不偏移 */
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
body{padding:20px;background:#f5f5f5;}
.container{max-width:1200px;margin:0 auto;background:white;padding:20px;border-radius:8px;}
h2{text-align:center;margin-bottom:15px;}
.btn-box{margin:15px 0;display:flex;gap:10px;flex-wrap:wrap;}
button{padding:8px 14px;border:none;border-radius:4px;color:white;cursor:pointer;}
button.save{background:#27ae60;}
button.add-row{background:#409eff;}
button.add-page{background:#9b59b6;}
button.del{background:#f56c6c;}
button.export{background:#67c23a;}
input[type="number"]{padding:8px;width:80px;border:1px solid #ddd;border-radius:4px;}

/* 配置栏样式 */
.config-box{
  margin-bottom:15px;
  padding:12px;
  border:1px solid #eee;
  border-radius:6px;
  background:#fafafa;
}
.config-item{
  margin:8px 0;
  display:flex;
  align-items:center;
  gap:8px;
}
.config-item label{
  width:90px;
  font-size:14px;
}
.config-item input{
  flex:1;
  padding:8px;
  border:1px solid #ddd;
  border-radius:4px;
  outline:none;
}
.config-btn{
  background:#3498db;
  margin-top:5px;
}

/* 日期行样式 */
.date-row{
  margin:15px 0;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:14px;
}
.date-row .required{
  position:relative;
}
.date-row .required::after{
  content:'*';
  color:red;
  position:absolute;
  right:-12px;
  top:50%;
  transform:translateY(-50%);
}
.date-input{
  padding:8px 12px;
  border:1px solid #ddd;
  border-radius:4px;
  min-width:220px;
  outline:none;
  cursor:text;
}

/* 表格核心样式 */
table{
  width:100%;
  border-collapse:collapse;border:1px solid #eee;margin:0;padding:0;
}
th,td{border:1px solid #eee;padding:12px;min-height:40px;min-width:100px;}
th{background:#f8f9fa;position:relative;}
th.required::after{content:'*';color:red;position:absolute;right:8px;top:50%;transform:translateY(-50%);}
td[contenteditable="true"]{outline:none;}

.pagination{margin:15px 0;text-align:center;padding-top:10px;}
.pagination button{background:#409eff;margin:0 5px;}
.pagination button:disabled{background:#ccc;cursor:not-allowed;}
</style>
</head>
<body>
<div class="container">
  <h2>实验室资源占用情况</h2>

  <!-- 配置区域：Bin ID + Master Key -->
  <div class="config-box">
    <div class="config-item">
      <label>zhanghao：</label>
      <input type="text" id="binIdInput" placeholder="账号">
    </div>
    <div class="config-item">
      <label>mima：</label>
      <input type="text" id="masterKeyInput" placeholder="密码">
    </div>
    <button class="config-btn" onclick="saveConfig()">保存配置</button>
  </div>

  <!-- 功能按钮区 -->
  <div class="btn-box">
    <button class="save" onclick="saveNow()">保存</button>
    <button class="add-row" onclick="addOneRow()">本页加一行</button>
    <input type="number" id="batchNum" placeholder="行数" min="1">
    <button class="add-row" onclick="batchAddRow()">批量加行</button>
    <button class="add-page" onclick="addNewPage()">新增一页</button>
    <button class="del" onclick="delChecked()">批量删除</button>
    <button class="del" onclick="delCurrentPage()">删除当前页</button>
    <button class="export" onclick="exportExcel()">导出Excel</button>
  </div>

  <!-- 日期输入 -->
  <div class="date-row">
    <span class="required">日期</span>：
    <div class="date-input" contenteditable="true" id="dateInput"></div>
  </div>

  <!-- 主体表格 -->
  <table>
    <thead>
      <tr>
        <th width="60"><input type="checkbox" id="checkAll"></th>
        <th class="required">资源*</th>
        <th class="required">socket*</th>
        <th class="required">芯片型号*</th>
        <th>实验内容</th>
        <th>预计需要时间</th>
        <th class="required">使用人*</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr>
        <td><input type="checkbox" class="row-check"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
      </tr>
      <tr>
        <td><input type="checkbox" class="row-check"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
      </tr>
      <tr>
        <td><input type="checkbox" class="row-check"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
        <td contenteditable="true"></td>
      </tr>
    </tbody>
  </table>

  <!-- 分页区域 -->
  <div class="pagination">
    <button id="prevBtn" disabled>上一页</button>
    <span id="pageInfo">1/1</span>
    <button id="nextBtn" disabled>下一页</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
let currentPage = 1;
let pages = [{
  rows: Array.from(document.querySelectorAll('#tableBody tr')).map(tr => {
    const tds = tr.querySelectorAll('td');
    return {
      resource: tds[1].innerText,
      socket: tds[2].innerText,
      chip: tds[3].innerText,
      content: tds[4].innerText,
      time: tds[5].innerText,
      user: tds[6].innerText
    };
  }),
  date: ''
}];

// ========== 配置读写逻辑 ==========
function saveConfig() {
  const binId = document.getElementById('binIdInput').value.trim();
  const masterKey = document.getElementById('masterKeyInput').value.trim();
  if(!binId || !masterKey){
    alert('请填写完整账号密码');
    return;
  }

  // 存入浏览器本地存储，下次打开自动读取
  localStorage.setItem('jsonbin_binId', binId);
  localStorage.setItem('jsonbin_masterKey', masterKey);
  alert('配置保存成功！页面将自动加载云端数据');
  // 保存后重新拉取云端数据
  loadCloudData();

  localStorage.setItem('jsonbin_binId', binId);
  localStorage.setItem('jsonbin_masterKey', masterKey);
  alert('保存成功！页面将自动加载云端数据');
  loadCloudData();
  document.querySelector('.config-box').style.display = 'none';
}

function getConfig() {
  return {
    binId: localStorage.getItem('jsonbin_binId') || '',
    masterKey: localStorage.getItem('jsonbin_masterKey') || ''
  };
}

async function loadCloudData(){
  const cfg = getConfig();
  if(!cfg.binId || !cfg.masterKey) return;

  try {
    const response = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`, {
      headers: {
        "X-Master-Key": cfg.masterKey
      }
    });
    const resData = await response.json();
    if (response.ok && resData.record) {
      pages = resData.record;
      currentPage = 1;
      renderPage(1);
      document.getElementById('pageInfo').innerText = `${currentPage}/${pages.length}`;
      if(pages.length > 1) document.getElementById('nextBtn').disabled = false;
    }
  } catch (error) {
    console.log('云端数据加载失败，使用本地初始内容');
  }
}

// ========== 表格行操作 ==========
function addOneRow() {
  const tbody = document.getElementById('tableBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="checkbox" class="row-check"></td>
    <td contenteditable="true"></td>
    <td contenteditable="true"></td>
    <td contenteditable="true"></td>
    <td contenteditable="true"></td>
    <td contenteditable="true"></td>
    <td contenteditable="true"></td>
  `;
  tbody.appendChild(tr);
  pages[currentPage-1].rows.push({
    resource: '', socket: '', chip: '', content: '', time: '', user: ''
  });
}

function batchAddRow() {
  const num = parseInt(document.getElementById('batchNum').value) || 1;
  for(let i=0; i<num; i++) addOneRow();
}

// ========== 新增一页 核心函数 ==========
function addNewPage() {
  // 先保存当前页面数据
  saveCurrentPageData();

  // 直接创建全新页面数据（默认3行，和初始页一致），不再操作旧页面DOM/数据
  const newPage = {
    date: "",
    rows: [
      { resource: "", socket: "", chip: "", content: "", time: "", user: "" },
      { resource: "", socket: "", chip: "", content: "", time: "", user: "" },
      { resource: "", socket: "", chip: "", content: "", time: "", user: "" }
    ]
  };

  // 追加新页面到数组
  pages.push(newPage);
  // 页码切换到新页
  currentPage = pages.length;
  // 渲染新页面
  renderPage(currentPage);

  // 更新页码与按钮状态
  document.getElementById('pageInfo').innerText = `${currentPage}/${pages.length}`;
  document.getElementById('prevBtn').disabled = false;
  document.getElementById('nextBtn').disabled = true;
}

// 保存当前页数据
function saveCurrentPageData() {
  const rows = document.querySelectorAll('#tableBody tr');
  pages[currentPage-1].rows = Array.from(rows).map(tr => {
    const tds = tr.querySelectorAll('td');
    return {
      resource: tds[1].innerText,
      socket: tds[2].innerText,
      chip: tds[3].innerText,
      content: tds[4].innerText,
      time: tds[5].innerText,
      user: tds[6].innerText
    };
  });
  pages[currentPage-1].date = document.getElementById('dateInput').innerText.trim();
}

// 保存到云端
async function saveNow() {
  saveCurrentPageData();
  const cfg = getConfig();
  if(!cfg.binId || !cfg.masterKey){
    alert('请先填写并保存上方的 Bin ID 和 Master Key！');
    return;
  }

  try {
    const response = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": cfg.masterKey
      },
      body: JSON.stringify(pages)
    });
    const resData = await response.json();
    if (response.ok) {
      alert('保存成功！');
    } else {
      alert('保存失败：' + (resData.message || '请检查配置是否正确'));
    }
  } catch (error) {
    alert('网络异常，保存失败');
    console.error(error);
  }
}

// 批量删除勾选行
function delChecked() {
  const checkedRows = document.querySelectorAll('.row-check:checked');
  if(checkedRows.length === 0) {
    alert('请先勾选要删除的行！');
    return;
  }
  checkedRows.forEach(row => row.closest('tr').remove());
  saveCurrentPageData();
}

function delCurrentPage(){
  if(pages.length <= 1){
    alert('至少保留一页，无法删除');
    return;
  }
  saveCurrentPageData();
  pages.splice(currentPage - 1,1);
  if(currentPage > pages.length){
    currentPage = pages.length;
  }
  renderPage(currentPage);
  document.getElementById('pageInfo').innerText = currentPage + '/' + pages.length;
  document.getElementById('prevBtn').disabled = currentPage === 1;
  document.getElementById('nextBtn').disabled = currentPage === pages.length;
}

// 导出Excel
function exportExcel() {
  saveCurrentPageData();
  const wsData = [['资源', 'socket', '芯片型号', '实验内容', '预计需要时间', '使用人', '日期']];
  pages.forEach((page, idx) => {
    wsData.push([`=== 第${idx+1}页 ===`, '', '', '', '', '', '']);
    page.rows.forEach(row => {
      wsData.push([row.resource, row.socket, row.chip, row.content, row.time, row.user, page.date]);
    });
  });
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '资源占用表');
  XLSX.writeFile(wb, '实验室资源占用表.xlsx');
}

// ========== 分页逻辑 ==========
document.getElementById('prevBtn').onclick = function() {
  if(currentPage > 1) {
    saveCurrentPageData();
    currentPage--;
    renderPage(currentPage);
    document.getElementById('pageInfo').innerText = `${currentPage}/${pages.length}`;
    if(currentPage === 1) this.disabled = true;
    document.getElementById('nextBtn').disabled = false;
  }
};

document.getElementById('nextBtn').onclick = function() {
  if(currentPage < pages.length) {
    saveCurrentPageData();
    currentPage++;
    renderPage(currentPage);
    document.getElementById('pageInfo').innerText = `${currentPage}/${pages.length}`;
    if(currentPage === pages.length) this.disabled = true;
    document.getElementById('prevBtn').disabled = false;
  }
};

// 渲染指定页面
function renderPage(pageNum) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  pages[pageNum-1].rows.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="checkbox" class="row-check"></td>
      <td contenteditable="true">${row.resource}</td>
      <td contenteditable="true">${row.socket}</td>
      <td contenteditable="true">${row.chip}</td>
      <td contenteditable="true">${row.content}</td>
      <td contenteditable="true">${row.time}</td>
      <td contenteditable="true">${row.user}</td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('dateInput').innerText = pages[pageNum-1].date || '';
}

// 全选
document.getElementById('checkAll').onclick = function() {
  const allChecks = document.querySelectorAll('.row-check');
  allChecks.forEach(check => check.checked = this.checked);
};

// Ctrl+S 快捷键保存
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    saveNow();
  }
});

// 页面初始化
window.onload = function() {
  const cfg = getConfig();
  document.getElementById('binIdInput').value = cfg.binId;
  document.getElementById('masterKeyInput').value = cfg.masterKey;
  if(cfg.binId && cfg.masterKey){
    loadCloudData();
    document.querySelector('.config-box').style.display = 'none';
  }
};
</script>
</body>
</html>
